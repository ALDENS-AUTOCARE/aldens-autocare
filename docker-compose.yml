version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: aldens_autocare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aldens_autocare
    ports:
      - "5432:5432"
    volumes:
      - aldens_autocare_pgdata:/var/lib/postgresql/data

volumes:
  aldens_autocare_pgdata:
